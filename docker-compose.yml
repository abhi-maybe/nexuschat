services:
  nexuschat:
    build: .
    container_name: nexuschat
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DATABASE_URL=${DATABASE_URL:-}
      - DEFAULT_PROVIDER=${DEFAULT_PROVIDER:-ollama}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-llama3.2}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    volumes:
      - nexuschat-data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Optional: Run Ollama alongside NexusChat
  # Uncomment the block below to spin up Ollama automatically.
  #
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: ollama
  #   restart: unless-stopped
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama-data:/root/.ollama
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: all
  #             capabilities: [gpu]

volumes:
  nexuschat-data:
  # ollama-data:
