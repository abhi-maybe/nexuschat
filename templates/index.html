<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>NexusChat</title>
    <meta name="description" content="Chat with local and cloud AI models">
    <link rel="icon" href="/static/img/favicon.svg" type="image/svg+xml">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#10a37f">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
</head>
<body>
    <div id="app">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <g stroke="#10a37f" stroke-width="1.8" stroke-linecap="round">
                            <ellipse cx="12" cy="12" rx="10" ry="4"/>
                            <ellipse cx="12" cy="12" rx="10" ry="4" transform="rotate(60 12 12)"/>
                            <ellipse cx="12" cy="12" rx="10" ry="4" transform="rotate(120 12 12)"/>
                            <circle cx="12" cy="12" r="2" fill="#10a37f"/>
                        </g>
                    </svg>
                    <span>NexusChat</span>
                </div>
                <button id="new-chat-btn" class="btn-new-chat" title="New Chat (Ctrl+N)">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 5v14M5 12h14"/>
                    </svg>
                </button>
            </div>

            <div id="conversations-list" class="conversations-list"></div>

            <div class="sidebar-footer">
                <button id="settings-btn" class="btn-settings">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </svg>
                    <span>Settings</span>
                </button>
                <div class="user-info">
                    <div class="user-avatar" id="user-avatar">U</div>
                    <span id="user-name">User</span>
                </div>
            </div>
        </aside>

        <!-- Mobile sidebar overlay -->
        <div id="sidebar-overlay" class="sidebar-overlay hidden"></div>

        <!-- Main Chat Area -->
        <main id="main-content" class="main-content">
            <!-- Top bar -->
            <header class="top-bar">
                <button id="sidebar-toggle" class="sidebar-toggle" title="Toggle sidebar (Ctrl+B)">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 12h18M3 6h18M3 18h18"/>
                    </svg>
                </button>
                <div class="model-selector">
                    <select id="provider-select">
                        <option value="ollama">🏠 Ollama (Local)</option>
                        <option value="openai">☁️ OpenAI</option>
                        <option value="anthropic">🧠 Anthropic</option>
                        <option value="deepseek">🔮 DeepSeek</option>
                        <option value="xiaomi">🔵 Xiaomi MiMo</option>
                        <option value="groq">⚡ Groq</option>
                    </select>
                    <select id="model-select">
                        <option value="">Loading models...</option>
                    </select>
                </div>
                <div class="top-bar-actions">
                    <button id="theme-toggle" class="btn-icon" title="Toggle theme">
                        <span class="theme-icon">☀️</span>
                    </button>
                    <button id="system-prompt-btn" class="btn-icon" title="System Prompt">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                            <polyline points="14 2 14 8 20 8"/>
                            <line x1="16" y1="13" x2="8" y2="13"/>
                            <line x1="16" y1="17" x2="8" y2="17"/>
                        </svg>
                    </button>
                </div>
            </header>

            <!-- Chat Messages -->
            <div id="chat-container" class="chat-container">
                <div id="chat-messages" class="chat-messages">
                    <!-- Welcome screen rendered by JS -->
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <div class="input-wrapper">
                    <textarea id="chat-input" placeholder="Send a message... (Enter to send, Shift+Enter for newline)" rows="1"></textarea>
                    <span id="char-count" class="char-count"></span>
                    <button id="send-btn" class="btn-send" disabled title="Send (Enter)">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"/>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                        </svg>
                    </button>
                    <button id="stop-btn" class="btn-stop hidden" title="Stop generating">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <rect x="6" y="6" width="12" height="12" rx="2"/>
                        </svg>
                    </button>
                </div>
                <p class="input-hint">NexusChat can make mistakes. Consider verifying important information.</p>
            </div>
        </main>

        <!-- Settings Modal -->
        <div id="settings-modal" class="modal hidden">
            <div class="modal-backdrop"></div>
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Settings</h2>
                    <button id="close-settings" class="btn-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"/>
                            <line x1="6" y1="6" x2="18" y2="18"/>
                        </svg>
                    </button>
                </div>
                <div class="settings-body">
                    <div class="settings-section">
                        <h3>Providers</h3>
                        <div class="setting-group">
                            <label for="setting-ollama-url">Ollama URL</label>
                            <input type="text" id="setting-ollama-url" value="http://localhost:11434" placeholder="http://localhost:11434">
                        </div>
                        <div class="setting-group">
                            <label for="setting-openai-key">OpenAI API Key</label>
                            <input type="password" id="setting-openai-key" placeholder="sk-...">
                        </div>
                        <div class="setting-group">
                            <label for="setting-anthropic-key">Anthropic API Key</label>
                            <input type="password" id="setting-anthropic-key" placeholder="sk-ant-...">

                            <label for="setting-deepseek-key">DeepSeek API Key</label>
                            <input type="password" id="setting-deepseek-key" placeholder="sk-...">

                            <label for="setting-groq-key">Groq API Key</label>
                            <input type="password" id="setting-groq-key" placeholder="gsk_...">

                            <label for="setting-xiaomi-key">Xiaomi API Key</label>
                            <input type="password" id="setting-xiaomi-key" placeholder="sk-...">
                        </div>
                    </div>
                    <div class="settings-section">
                        <h3>Defaults</h3>
                        <div class="setting-group">
                            <label for="setting-default-provider">Default Provider</label>
                            <select id="setting-default-provider">
                                <option value="ollama">Ollama</option>
                                <option value="openai">OpenAI</option>
                                <option value="anthropic">Anthropic</option>
                                <option value="deepseek">DeepSeek</option>
                                <option value="xiaomi">Xiaomi MiMo</option>
                                <option value="groq">Groq</option>
                            </select>
                        </div>
                        <div class="setting-group">
                            <label for="setting-system-prompt">Default System Prompt</label>
                            <textarea id="setting-system-prompt" rows="3" placeholder="You are a helpful assistant."></textarea>
                        </div>
                        <div class="setting-group">
                            <label for="setting-temperature">Temperature</label>
                            <div class="slider-group">
                                <input type="range" id="setting-temperature" min="0" max="2" step="0.1" value="0.7">
                                <span id="temperature-value" class="slider-value">0.7</span>
                            </div>
                        </div>
                    </div>
                    <div class="settings-section">
                        <h3>Appearance</h3>
                        <div class="setting-group">
                            <label for="setting-theme">Theme</label>
                            <select id="setting-theme">
                                <option value="dark">Dark</option>
                                <option value="light">Light</option>
                            </select>
                        </div>
                    </div>
                    <button id="save-settings" class="btn-primary">Save Settings</button>
                </div>
            </div>
        </div>

        <!-- System Prompt Modal -->
        <div id="system-prompt-modal" class="modal hidden">
            <div class="modal-backdrop"></div>
            <div class="modal-content modal-sm">
                <div class="modal-header">
                    <h2>System Prompt</h2>
                    <button class="btn-icon close-modal" data-target="system-prompt-modal">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"/>
                            <line x1="6" y1="6" x2="18" y2="18"/>
                        </svg>
                    </button>
                </div>
                <textarea id="system-prompt-input" rows="5" placeholder="You are a helpful assistant..."></textarea>
                <button id="save-system-prompt" class="btn-primary">Apply</button>
            </div>
        </div>
    </div>

    <!-- Scripts: utils first, then keyboard, then app -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/js/utils.js"></script>
    <script src="/static/js/keyboard.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
