<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusChat</title>
    <meta name="description" content="Chat with local and cloud AI models">
    <link rel="icon" href="/static/img/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
</head>
<body>
    <div id="app">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>NexusChat</span>
                </div>
                <button id="new-chat-btn" class="btn-icon" title="New Chat">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
                </button>
            </div>
            <div id="conversations-list" class="conversations-list"></div>
            <div class="sidebar-footer">
                <button id="settings-btn" class="btn-settings">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
                    <span>Settings</span>
                </button>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main id="main-content" class="main-content">
            <!-- Top bar -->
            <header class="top-bar">
                <button id="sidebar-toggle" class="btn-icon mobile-only">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
                </button>
                <div class="model-selector">
                    <select id="provider-select">
                        <option value="ollama">🏠 Ollama (Local)</option>
                        <option value="openai">☁️ OpenAI</option>
                        <option value="anthropic">Anthropic</option>
                    </select>
                    <select id="model-select">
                        <option value="">Loading models...</option>
                    </select>
                </div>
                <div class="top-bar-actions">
                    <button id="system-prompt-btn" class="btn-icon" title="System Prompt">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                    </button>
                </div>
            </header>

            <!-- Chat Messages -->
            <div id="chat-container" class="chat-container">
                <div id="chat-messages" class="chat-messages">
                    <!-- Welcome screen -->
                    <div id="welcome-screen" class="welcome-screen">
                        <div class="welcome-icon">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none">
                                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </div>
                        <h2>NexusChat</h2>
                        <p>Chat with local and cloud AI models</p>
                        <div class="welcome-cards">
                            <div class="welcome-card" data-prompt="Explain quantum computing in simple terms">
                                <span class="card-icon">🔬</span>
                                <span>Explain quantum computing</span>
                            </div>
                            <div class="welcome-card" data-prompt="Write a Python function to sort a list using merge sort">
                                <span class="card-icon">💻</span>
                                <span>Write merge sort in Python</span>
                            </div>
                            <div class="welcome-card" data-prompt="What are the key differences between REST and GraphQL?">
                                <span class="card-icon">🌐</span>
                                <span>REST vs GraphQL</span>
                            </div>
                            <div class="welcome-card" data-prompt="Help me write a creative short story about a time traveler">
                                <span class="card-icon">✍️</span>
                                <span>Creative writing help</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <div class="input-wrapper">
                    <textarea id="chat-input" placeholder="Send a message..." rows="1"></textarea>
                    <button id="send-btn" class="btn-send" disabled>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                    </button>
                    <button id="stop-btn" class="btn-stop hidden">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
                    </button>
                </div>
                <p class="input-hint">NexusChat can make mistakes. Consider verifying important information.</p>
            </div>
        </main>

        <!-- Settings Modal -->
        <div id="settings-modal" class="modal hidden">
            <div class="modal-backdrop"></div>
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Settings</h2>
                    <button id="close-settings" class="btn-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </div>
                <div class="settings-body">
                    <div class="settings-section">
                        <h3>Providers</h3>
                        <div class="setting-group">
                            <label>Ollama URL</label>
                            <input type="text" id="setting-ollama-url" value="http://localhost:11434" placeholder="http://localhost:11434">
                        </div>
                        <div class="setting-group">
                            <label>OpenAI API Key</label>
                            <input type="password" id="setting-openai-key" placeholder="sk-...">
                        </div>
                        <div class="setting-group">
                            <label>Anthropic API Key</label>
                            <input type="password" id="setting-anthropic-key" placeholder="sk-ant-...">
                        </div>
                    </div>
                    <div class="settings-section">
                        <h3>Defaults</h3>
                        <div class="setting-group">
                            <label>Default Provider</label>
                            <select id="setting-default-provider">
                                <option value="ollama">Ollama</option>
                                <option value="openai">OpenAI</option>
                                <option value="anthropic">Anthropic</option>
                            </select>
                        </div>
                        <div class="setting-group">
                            <label>Default System Prompt</label>
                            <textarea id="setting-system-prompt" rows="3" placeholder="You are a helpful assistant."></textarea>
                        </div>
                    </div>
                    <div class="settings-section">
                        <h3>Appearance</h3>
                        <div class="setting-group">
                            <label>Theme</label>
                            <select id="setting-theme">
                                <option value="dark">Dark</option>
                                <option value="light">Light</option>
                            </select>
                        </div>
                    </div>
                    <button id="save-settings" class="btn-primary">Save Settings</button>
                </div>
            </div>
        </div>

        <!-- System Prompt Modal -->
        <div id="system-prompt-modal" class="modal hidden">
            <div class="modal-backdrop"></div>
            <div class="modal-content modal-sm">
                <div class="modal-header">
                    <h2>System Prompt</h2>
                    <button class="btn-icon close-modal" data-target="system-prompt-modal">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </div>
                <textarea id="system-prompt-input" rows="5" placeholder="You are a helpful assistant..."></textarea>
                <button id="save-system-prompt" class="btn-primary">Apply</button>
            </div>
        </div>
    </div>

    <script src="/static/js/utils.js"></script>
    <script src="/static/js/keyboard.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
