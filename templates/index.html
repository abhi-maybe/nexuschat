<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>NexusChat</title>
    <meta name="description" content="Chat with local and cloud AI models">
    <link rel="icon" href="/static/img/favicon.svg" type="image/svg+xml">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#6366f1">
    <script>
        if (!localStorage.getItem('nexuschat_token')) window.location.replace('/login');
    </script>
    <script>
        (function() {
            var theme = localStorage.getItem('nexuschat_theme') || 'dark';
            document.documentElement.setAttribute('data-theme', theme);
            var bg = localStorage.getItem('nexuschat_bg') || 'none';
            if (bg && bg !== 'none') {
                document.documentElement.setAttribute('data-bg', bg);
                if (bg === 'custom') {
                    var url = localStorage.getItem('nexuschat_bg_custom_url') || '';
                    var opacity = parseInt(localStorage.getItem('nexuschat_bg_custom_opacity') || '15', 10);
                    if (url) document.documentElement.style.setProperty('--custom-bg-url', 'url("' + url + '")');
                    document.documentElement.style.setProperty('--custom-bg-opacity', opacity / 100);
                }
            }
        })();
    </script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.24/dist/full.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
</head>
<body>
    <div id="app" class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <svg width="22" height="22" viewBox="0 0 32 32" fill="none" class="text-primary">
                        <g stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                            <ellipse cx="16" cy="16" rx="11" ry="4.5"/>
                            <ellipse cx="16" cy="16" rx="11" ry="4.5" transform="rotate(60 16 16)"/>
                            <ellipse cx="16" cy="16" rx="11" ry="4.5" transform="rotate(120 16 16)"/>
                            <circle cx="16" cy="16" r="2.5" fill="currentColor"/>
                        </g>
                    </svg>
                    <span>NexusChat</span>
                </div>
                <button id="new-chat-btn" class="btn btn-ghost btn-xs btn-circle" title="New Chat (Ctrl+N)">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 5v14M5 12h14"/>
                    </svg>
                </button>
            </div>

            <div id="conversations-list" class="conversations-list"></div>

            <div class="sidebar-footer">
                <button id="settings-btn" class="btn btn-ghost btn-sm justify-start gap-2 w-full">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </svg>
                    Settings
                </button>
                <div class="flex items-center gap-2 px-2 py-2 border-t border-base-300 mt-1">
                    <div class="avatar placeholder">
                        <div class="bg-primary text-primary-content rounded-full w-7 h-7 text-xs">
                            <span id="user-avatar">U</span>
                        </div>
                    </div>
                    <span id="user-name" class="text-sm truncate flex-1">User</span>
                    <button id="logout-btn" class="btn btn-ghost btn-xs" title="Logout">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                            <polyline points="16 17 21 12 16 7"/>
                            <line x1="21" y1="12" x2="9" y2="12"/>
                        </svg>
                    </button>
                </div>
            </div>
        </aside>

        <!-- Mobile sidebar overlay -->
        <div id="sidebar-overlay" class="sidebar-overlay"></div>

        <!-- Main Chat Area -->
        <main id="main-content" class="main-content">
            <!-- Top bar -->
            <header class="top-bar">
                <button id="sidebar-toggle" class="btn btn-ghost btn-xs btn-circle lg:hidden" title="Toggle sidebar (Ctrl+B)">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 12h18M3 6h18M3 18h18"/>
                    </svg>
                </button>
                <div class="model-selector">
                    <select id="provider-select" class="select select-xs select-bordered">
                        <option value="ollama">Ollama</option>
                        <option value="openai">OpenAI</option>
                        <option value="anthropic">Anthropic</option>
                        <option value="deepseek">DeepSeek</option>
                        <option value="xiaomi">Xiaomi MiMo</option>
                        <option value="groq">Groq</option>
                        <option value="openrouter">OpenRouter</option>
                    </select>
                    <select id="model-select" class="select select-xs select-bordered">
                        <option value="">Loading...</option>
                    </select>
                </div>
                <div class="top-bar-actions">
                    <!-- Theme Quick Toggle -->
                    <div class="dropdown dropdown-end">
                        <div tabindex="0" role="button" class="btn btn-ghost btn-xs btn-circle" title="Change theme">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-4">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M4.098 19.902a3.75 3.75 0 0 0 5.304 0l6.401-6.402M6.75 21A3.75 3.75 0 0 1 3 17.25V4.125C3 3.504 3.504 3 4.125 3h5.25c.621 0 1.125.504 1.125 1.125v4.072M6.75 21a3.75 3.75 0 0 0 3.75-3.75V8.197M6.75 21h13.125c.621 0 1.125-.504 1.125-1.125v-5.25c0-.621-.504-1.125-1.125-1.125h-4.072M10.5 8.197l2.88-2.88c.438-.439 1.15-.439 1.59 0l3.712 3.713c.44.44.44 1.152 0 1.59l-2.879 2.88M6.75 17.25h.008v.008H6.75v-.008Z" />
                            </svg>
                        </div>
                        <ul tabindex="0" class="dropdown-content z-[1] menu p-2 shadow-2xl bg-base-100 rounded-box w-44 max-h-72 overflow-y-auto" id="theme-menu">
                            <li class="menu-title text-xs">Theme</li>
                            <li><a data-theme-val="light">Light</a></li>
                            <li><a data-theme-val="dark">Dark</a></li>
                            <li><a data-theme-val="night">Night</a></li>
                            <li><a data-theme-val="dracula">Dracula</a></li>
                            <li><a data-theme-val="luxury">Luxury</a></li>
                            <li><a data-theme-val="sunset">Sunset</a></li>
                            <li><a data-theme-val="forest">Forest</a></li>
                            <li><a data-theme-val="winter">Winter</a></li>
                            <li><a data-theme-val="coffee">Coffee</a></li>
                            <li><a data-theme-val="dim">Dim</a></li>
                            <li><a data-theme-val="nord">Nord</a></li>
                            <li><a data-theme-val="abyss">Abyss</a></li>
                        </ul>
                    </div>
                    <button id="system-prompt-btn" class="btn btn-ghost btn-xs btn-circle" title="System Prompt">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                            <polyline points="14 2 14 8 20 8"/>
                            <line x1="16" y1="13" x2="8" y2="13"/>
                            <line x1="16" y1="17" x2="8" y2="17"/>
                        </svg>
                    </button>
                </div>
            </header>

            <!-- Chat Messages -->
            <div id="chat-container" class="chat-container">
                <div id="chat-messages" class="chat-messages"></div>
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <div class="input-wrapper">
                    <textarea id="chat-input" placeholder="Send a message..." rows="1"></textarea>
                    <span id="char-count" class="char-count"></span>
                    <button id="send-btn" class="btn btn-primary btn-xs btn-circle" disabled title="Send (Enter)">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                        </svg>
                    </button>
                    <button id="stop-btn" class="btn btn-error btn-xs btn-circle hidden" title="Stop generating">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                            <rect x="6" y="6" width="12" height="12" rx="2"/>
                        </svg>
                    </button>
                </div>
                <p class="input-hint">NexusChat can make mistakes. Verify important information.</p>
            </div>
        </main>

        <!-- Settings Modal -->
        <dialog id="settings-modal" class="modal">
            <div class="modal-box max-w-lg">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="font-bold text-lg">Settings</h3>
                    <form method="dialog"><button class="btn btn-ghost btn-xs btn-circle">✕</button></form>
                </div>
                <div class="space-y-6">
                    <div>
                        <h4 class="text-xs font-semibold uppercase text-primary mb-3 tracking-wider">Providers</h4>
                        <div class="space-y-3">
                            <label class="form-control w-full">
                                <div class="label py-1"><span class="label-text text-xs">Ollama URL</span></div>
                                <input type="text" id="setting-ollama-url" class="input input-sm input-bordered w-full" value="http://localhost:11434" />
                            </label>
                            <label class="form-control w-full">
                                <div class="label py-1"><span class="label-text text-xs">OpenAI API Key</span></div>
                                <input type="password" id="setting-openai-key" class="input input-sm input-bordered w-full" placeholder="sk-..." />
                            </label>
                            <label class="form-control w-full">
                                <div class="label py-1"><span class="label-text text-xs">Anthropic API Key</span></div>
                                <input type="password" id="setting-anthropic-key" class="input input-sm input-bordered w-full" placeholder="sk-ant-..." />
                            </label>
                            <label class="form-control w-full">
                                <div class="label py-1"><span class="label-text text-xs">DeepSeek API Key</span></div>
                                <input type="password" id="setting-deepseek-key" class="input input-sm input-bordered w-full" placeholder="sk-..." />
                            </label>
                            <label class="form-control w-full">
                                <div class="label py-1"><span class="label-text text-xs">Groq API Key</span></div>
                                <input type="password" id="setting-groq-key" class="input input-sm input-bordered w-full" placeholder="gsk_..." />
                            </label>
                            <label class="form-control w-full">
                                <div class="label py-1"><span class="label-text text-xs">Xiaomi API Key</span></div>
                                <input type="password" id="setting-xiaomi-key" class="input input-sm input-bordered w-full" placeholder="sk-..." />
                            </label>
                            <label class="form-control w-full">
                                <div class="label py-1"><span class="label-text text-xs">OpenRouter API Key</span></div>
                                <input type="password" id="setting-openrouter-key" class="input input-sm input-bordered w-full" placeholder="sk-or-..." />
                            </label>
                        </div>
                    </div>
                    <div>
                        <h4 class="text-xs font-semibold uppercase text-primary mb-3 tracking-wider">Defaults</h4>
                        <div class="space-y-3">
                            <label class="form-control w-full">
                                <div class="label py-1"><span class="label-text text-xs">Default Provider</span></div>
                                <select id="setting-default-provider" class="select select-sm select-bordered w-full">
                                    <option value="ollama">Ollama</option>
                                    <option value="openai">OpenAI</option>
                                    <option value="anthropic">Anthropic</option>
                                    <option value="deepseek">DeepSeek</option>
                                    <option value="xiaomi">Xiaomi MiMo</option>
                                    <option value="groq">Groq</option>
                                    <option value="openrouter">OpenRouter</option>
                                </select>
                            </label>
                            <label class="form-control w-full">
                                <div class="label py-1"><span class="label-text text-xs">Default System Prompt</span></div>
                                <textarea id="setting-system-prompt" class="textarea textarea-sm textarea-bordered w-full" rows="2" placeholder="You are a helpful assistant."></textarea>
                            </label>
                            <label class="form-control w-full">
                                <div class="label py-1"><span class="label-text text-xs">Temperature</span></div>
                                <div class="flex items-center gap-3">
                                    <input type="range" id="setting-temperature" min="0" max="2" step="0.1" value="0.7" class="range range-xs range-primary flex-1" />
                                    <span id="temperature-value" class="text-xs font-mono w-8 text-right">0.7</span>
                                </div>
                            </label>
                        </div>
                    </div>
                    <div>
                        <h4 class="text-xs font-semibold uppercase text-primary mb-3 tracking-wider">Appearance</h4>
                        <div class="space-y-3">
                            <label class="form-control w-full">
                                <div class="label py-1"><span class="label-text text-xs">Theme</span></div>
                                <select id="setting-theme" class="select select-sm select-bordered w-full">
                                    <option value="dark">Dark</option>
                                    <option value="light">Light</option>
                                    <option value="night">Night</option>
                                    <option value="dracula">Dracula</option>
                                    <option value="luxury">Luxury</option>
                                    <option value="sunset">Sunset</option>
                                    <option value="forest">Forest</option>
                                    <option value="winter">Winter</option>
                                    <option value="coffee">Coffee</option>
                                    <option value="dim">Dim</option>
                                    <option value="nord">Nord</option>
                                    <option value="abyss">Abyss</option>
                                </select>
                            </label>
                        </div>
                    </div>
                    <button id="save-settings" class="btn btn-primary btn-sm w-full">Save Settings</button>
                </div>
            </div>
            <form method="dialog" class="modal-backdrop"><button>close</button></form>
        </dialog>

        <!-- System Prompt Modal -->
        <dialog id="system-prompt-modal" class="modal">
            <div class="modal-box max-w-md">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="font-bold text-lg">System Prompt</h3>
                    <form method="dialog"><button class="btn btn-ghost btn-xs btn-circle close-modal">✕</button></form>
                </div>
                <textarea id="system-prompt-input" class="textarea textarea-bordered w-full" rows="4" placeholder="You are a helpful assistant..."></textarea>
                <div class="modal-action">
                    <button id="save-system-prompt" class="btn btn-primary btn-sm">Apply</button>
                </div>
            </div>
            <form method="dialog" class="modal-backdrop"><button>close</button></form>
        </dialog>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/js/utils.js"></script>
    <script src="/static/js/keyboard.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
