<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusChat</title>
    <link rel="icon" href="/static/img/favicon.svg" type="image/svg+xml">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#6366f1">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.24/dist/full.min.css" rel="stylesheet" />
    <script>
        var _origWarn = console.warn;
        console.warn = function() {
            if (arguments[0] && typeof arguments[0] === 'string' && arguments[0].includes('cdn.tailwindcss.com')) return;
            _origWarn.apply(console, arguments);
        };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    (function() {
        var theme = localStorage.getItem('nexuschat_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', theme);
    })();
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .login-bg {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: oklch(var(--b2));
            position: relative;
            overflow: hidden;
        }
        .login-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(139, 92, 246, 0.06) 0%, transparent 40%);
            pointer-events: none;
        }
        .theme-selector {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 50;
        }
    </style>
</head>
<body>
    <div class="theme-selector">
        <div class="dropdown dropdown-end">
            <div tabindex="0" role="button" class="btn btn-ghost btn-circle btn-sm">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4.098 19.902a3.75 3.75 0 0 0 5.304 0l6.401-6.402M6.75 21A3.75 3.75 0 0 1 3 17.25V4.125C3 3.504 3.504 3 4.125 3h5.25c.621 0 1.125.504 1.125 1.125v4.072M6.75 21a3.75 3.75 0 0 0 3.75-3.75V8.197M6.75 21h13.125c.621 0 1.125-.504 1.125-1.125v-5.25c0-.621-.504-1.125-1.125-1.125h-4.072M10.5 8.197l2.88-2.88c.438-.439 1.15-.439 1.59 0l3.712 3.713c.44.44.44 1.152 0 1.59l-2.879 2.88M6.75 17.25h.008v.008H6.75v-.008Z" />
                </svg>
            </div>
            <ul tabindex="0" class="dropdown-content z-[1] menu p-2 shadow-2xl bg-base-100 rounded-box w-52 max-h-80 overflow-y-auto" id="theme-menu">
                <li class="menu-title">Theme</li>
                <li><a data-theme-val="light">Light</a></li>
                <li><a data-theme-val="dark">Dark</a></li>
                <li><a data-theme-val="night">Night</a></li>
                <li><a data-theme-val="dracula">Dracula</a></li>
                <li><a data-theme-val="luxury">Luxury</a></li>
                <li><a data-theme-val="sunset">Sunset</a></li>
                <li><a data-theme-val="forest">Forest</a></li>
                <li><a data-theme-val="winter">Winter</a></li>
                <li><a data-theme-val="coffee">Coffee</a></li>
                <li><a data-theme-val="dim">Dim</a></li>
                <li><a data-theme-val="nord">Nord</a></li>
                <li><a data-theme-val="abyss">Abyss</a></li>
            </ul>
        </div>
    </div>

    <div class="login-bg">
        <div class="card bg-base-100 shadow-2xl w-full max-w-sm mx-4 relative z-10">
            <div class="card-body gap-6">
                <div class="flex flex-col items-center gap-2 pt-2">
                    <svg width="36" height="36" viewBox="0 0 32 32" fill="none" class="text-primary">
                        <g stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                            <ellipse cx="16" cy="16" rx="11" ry="4.5"/>
                            <ellipse cx="16" cy="16" rx="11" ry="4.5" transform="rotate(60 16 16)"/>
                            <ellipse cx="16" cy="16" rx="11" ry="4.5" transform="rotate(120 16 16)"/>
                            <circle cx="16" cy="16" r="2.5" fill="currentColor"/>
                        </g>
                    </svg>
                    <h1 class="text-xl font-bold tracking-tight">NexusChat</h1>
                    <p class="text-sm text-base-content/50">Chat with AI models</p>
                </div>

                <div class="tabs tabs-boxed bg-base-200">
                    <button class="tab tab-active" data-tab="login">Sign In</button>
                    <button class="tab" data-tab="register">Create Account</button>
                </div>

                <form id="login-form" class="flex flex-col gap-3">
                    <label class="input input-bordered flex items-center gap-2 w-full">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" class="w-4 h-4 opacity-40">
                            <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6ZM12.735 14c.61 0 1.067-.577.948-1.175a5.5 5.5 0 0 0-9.476 0c-.12.598.338 1.175.948 1.175h7.576Z" />
                        </svg>
                        <input type="text" id="login-username" class="grow" placeholder="Username" autocomplete="username" required />
                    </label>
                    <label class="input input-bordered flex items-center gap-2 w-full">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" class="w-4 h-4 opacity-40">
                            <path fill-rule="evenodd" d="M14 6a4 4 0 0 1-4.899 3.899l-1.955 1.955a.5.5 0 0 1-.353.146H5v1.5a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1-.5-.5v-2.293a.5.5 0 0 1 .146-.353l3.955-3.955A4 4 0 1 1 14 6Zm-4-2a.75.75 0 0 0 0 1.5.5.5 0 0 1 .5.5.75.75 0 0 0 1.5 0 2 2 0 0 0-2-2Z" clip-rule="evenodd" />
                        </svg>
                        <input type="password" id="login-password" class="grow" placeholder="Password" autocomplete="current-password" required />
                    </label>
                    <button type="submit" class="btn btn-primary w-full">Sign In</button>
                    <p id="login-error" class="text-error text-xs text-center hidden"></p>
                </form>

                <form id="register-form" class="flex flex-col gap-3 hidden">
                    <label class="input input-bordered flex items-center gap-2 w-full">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" class="w-4 h-4 opacity-40">
                            <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6ZM12.735 14c.61 0 1.067-.577.948-1.175a5.5 5.5 0 0 0-9.476 0c-.12.598.338 1.175.948 1.175h7.576Z" />
                        </svg>
                        <input type="text" id="reg-username" class="grow" placeholder="Username" autocomplete="username" required />
                    </label>
                    <label class="input input-bordered flex items-center gap-2 w-full">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" class="w-4 h-4 opacity-40">
                            <path fill-rule="evenodd" d="M14 6a4 4 0 0 1-4.899 3.899l-1.955 1.955a.5.5 0 0 1-.353.146H5v1.5a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1-.5-.5v-2.293a.5.5 0 0 1 .146-.353l3.955-3.955A4 4 0 1 1 14 6Zm-4-2a.75.75 0 0 0 0 1.5.5.5 0 0 1 .5.5.75.75 0 0 0 1.5 0 2 2 0 0 0-2-2Z" clip-rule="evenodd" />
                        </svg>
                        <input type="password" id="reg-password" class="grow" placeholder="Password" autocomplete="new-password" required minlength="4" />
                    </label>
                    <label class="input input-bordered flex items-center gap-2 w-full">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" class="w-4 h-4 opacity-40">
                            <path fill-rule="evenodd" d="M14 6a4 4 0 0 1-4.899 3.899l-1.955 1.955a.5.5 0 0 1-.353.146H5v1.5a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1-.5-.5v-2.293a.5.5 0 0 1 .146-.353l3.955-3.955A4 4 0 1 1 14 6Zm-4-2a.75.75 0 0 0 0 1.5.5.5 0 0 1 .5.5.75.75 0 0 0 1.5 0 2 2 0 0 0-2-2Z" clip-rule="evenodd" />
                        </svg>
                        <input type="password" id="reg-password2" class="grow" placeholder="Confirm password" autocomplete="new-password" required />
                    </label>
                    <button type="submit" class="btn btn-primary w-full">Create Account</button>
                    <p id="register-error" class="text-error text-xs text-center hidden"></p>
                </form>
            </div>
        </div>
    </div>

    <script>
    function setTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('nexuschat_theme', theme);
    }

    (function () {
        if (localStorage.getItem('nexuschat_token')) {
            window.location.href = '/';
            return;
        }

        // Theme menu click handler
        document.getElementById('theme-menu').addEventListener('click', function(e) {
            var item = e.target.closest('[data-theme-val]');
            if (item) {
                setTheme(item.getAttribute('data-theme-val'));
            }
        });

        // Tab switching
        document.querySelectorAll('[data-tab]').forEach(function (btn) {
            btn.addEventListener('click', function () {
                document.querySelectorAll('[data-tab]').forEach(function (b) { b.classList.remove('tab-active'); });
                btn.classList.add('tab-active');
                document.getElementById('login-form').classList.toggle('hidden', btn.dataset.tab !== 'login');
                document.getElementById('register-form').classList.toggle('hidden', btn.dataset.tab !== 'register');
            });
        });

        // Login
        document.getElementById('login-form').addEventListener('submit', async function (e) {
            e.preventDefault();
            var errEl = document.getElementById('login-error');
            errEl.classList.add('hidden');
            try {
                var resp = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('login-username').value,
                        password: document.getElementById('login-password').value,
                    }),
                });
                if (!resp.ok) { var data = await resp.json(); throw new Error(data.detail || 'Login failed'); }
                var data = await resp.json();
                localStorage.setItem('nexuschat_token', data.token);
                localStorage.setItem('nexuschat_username', data.username || '');
                window.location.href = '/';
            } catch (err) {
                errEl.textContent = err.message;
                errEl.classList.remove('hidden');
            }
        });

        // Register
        document.getElementById('register-form').addEventListener('submit', async function (e) {
            e.preventDefault();
            var errEl = document.getElementById('register-error');
            errEl.classList.add('hidden');
            var pw = document.getElementById('reg-password').value;
            var pw2 = document.getElementById('reg-password2').value;
            if (pw !== pw2) {
                errEl.textContent = 'Passwords do not match';
                errEl.classList.remove('hidden');
                return;
            }
            try {
                var resp = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('reg-username').value,
                        password: pw,
                    }),
                });
                if (!resp.ok) { var data = await resp.json(); throw new Error(data.detail || 'Registration failed'); }
                var data = await resp.json();
                localStorage.setItem('nexuschat_token', data.token);
                localStorage.setItem('nexuschat_username', data.username || '');
                window.location.href = '/';
            } catch (err) {
                errEl.textContent = err.message;
                errEl.classList.remove('hidden');
            }
        });
    })();
    </script>
</body>
</html>
